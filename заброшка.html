<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>quenesi/тут нечего</title>
    <link rel="icon" href="иконка.png" sizes="any">
    <link rel="stylesheet" href="css/all.css"/>
<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #000000;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
    }

    .glow-box {
        position: relative;
        background: #000000;
        display: flex;
        justify-content: center;
        align-items: center;
        max-width: 600px;
        width: 90%;
        pointer-events: none;


    }


    .glow-box img {
        width: 100%;
        height: auto;
        display: block;
        object-fit: contain;
        box-shadow:0 0 20px #ff0000;

        filter: brightness(1.1) contrast(1.1);
        pointer-events: none;
    }
    body, .glow-box, .glow-box img {
        user-select: text;
        -webkit-user-select: text;
    }

    ::selection {
        background: #0000FF;
        color: #00FF00;
    }
    img::selection {
        background: rgba(0, 0, 255, 0.4);
    }

</style>
</head>
<body>
    <audio id="screamer-sound" src="novosti.mp3"></audio>


    <script>
        const audio = document.getElementById('screamer-sound');

        const wait = (ms) => new Promise(resolve => setTimeout(resolve, ms));


        window.onload = async function() {
            try {
                await wait(30000);


                await audio.play().catch(err => {
                    console.log("Браузер заблокировал звук, так как не было клика по странице");
                });


                await wait(17000);

                console.log("Сайт зависает...");
                while (true) {
                    alert("я кольмар")
                }

            } catch (e) {
                console.error("Произошла ошибка в логике скрипта:", e);
            }
        };

    </script>

    <div class="glow-box">
        <img src="rty.jpg" alt="я кальмар">
    </div>

</body>
</html>
