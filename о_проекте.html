    <style>

        .ybutton {

        cursor: pointer;

        .ybutton img {

          border-radius: 4px;
          margin-left: 5%;

        }

        #projectIcon {
          width: 50px;
          height: 50px;
          object-fit: contain;
          margin-left: 5%;

        }

          font-weight: bold;

    </style>
    <img decoding="async" src="quenesi.png" id="myImage" class="wp-image-981" width="115" sizes="(max-width: 231px) 100vw, 231px"

  название проекта - <span id="projectName"></span>

</div>

<div class="stage-block">
  этап проекта - <span id="projectStage"></span>

<script>
  const projectsDatabase = {
    "gta-6": {
      title: "GTA 6",
      desc: "Легендарное продолжение серии в Вайс-Сити.",
      stage: "Разработка",
      icon: "https://example.com" // Ссылка на картинку/иконку
    },
    "cyberpunk": {
      title: "Cyberpunk 2",
      desc: "Новая история в Найт-Сити с улучшенным движком.",
      stage: "Концепт",
      icon: "images/cyberpunk-icon.svg" // Или локальный путь к файлу в вашей папке
    }
  };

  // Дефолтный проект (если в URL ничего не указано)
  const defaultProject = {
    title: "Мой Главный Проект",
    desc: "Это стандартное описание главного проекта, потому что в адресе сайта ничего не передано.",
    stage: "Техподдержка",
    icon: "images/default-icon.png"
  };

  function initDynamicInterface() {
    const urlParams = new URLSearchParams(window.location.search);
    const projectKey = urlParams.get('project');

    let currentProject = (projectKey && projectsDatabase[projectKey]) ? projectsDatabase[projectKey] : defaultProject;

    // Подставляем тексты
    document.getElementById('projectName').innerText = currentProject.title;
    document.getElementById('projectDesc').innerText = currentProject.desc;
    document.getElementById('projectStage').innerText = currentProject.stage;

    // Подставляем картинку в тег <img>
    const iconElement = document.getElementById('projectIcon');
    iconElement.src = currentProject.icon;
    iconElement.alt = `Иконка ${currentProject.title}`;
  }

  window.addEventListener('DOMContentLoaded', initDynamicInterface);
</script>

<script>

    const localBase = 'icons/';
    const totalIcons = 61;
    const windowsIcons = [];
    for (let i = 1; i <= totalIcons; i++) {
        windowsIcons.push(`${i}.ico`);
    }

    const getRandom = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

    function makeIconDraggable(img) {
        let isDragging = false;
        let isMoved = false;
        let startX, startY;
        let shiftX, shiftY;

        img.addEventListener('mousedown', function(e) {
            if (e.button !== 0) return;

            startX = e.clientX;
            startY = e.clientY;
            isMoved = false;
            isDragging = true;

            const rect = img.getBoundingClientRect();
            shiftX = e.clientX - rect.left;
            shiftY = e.clientY - rect.top;

            img.style.zIndex = '1';

            e.preventDefault();
        });

        document.addEventListener('mousemove', function(e) {
            if (!isDragging) return;

            if (Math.abs(e.clientX - startX) > 5 || Math.abs(e.clientY - startY) > 5) {
                isMoved = true;
            }

            let newX = e.clientX - shiftX;
            let newY = e.clientY - shiftY + window.scrollY;

            img.style.left = `${newX}px`;
            img.style.top = `${newY}px`;

            img.style.transform = `rotate(${img.dataset.angle}deg)`;
        });

        document.addEventListener('mouseup', function(e) {
            if (!isDragging) return;
            isDragging = false;

            img.style.zIndex = '1';

            if (!isMoved) {
                playRandomMusic();
            }
        });

        img.ondragstart = function() { return false; };
    }

    const generateRetroIcons = () => {
        const iconCount = getRandom(50, 80);
        const spawnedIcons = [];
        const minDistance = 70;
        const screenWidth = window.innerWidth;

        const screenHeight = Math.max(
            document.body.scrollHeight,
            document.documentElement.scrollHeight,
            document.body.offsetHeight,
            document.documentElement.offsetHeight,
            document.body.clientHeight,
            document.documentElement.clientHeight
        );

        for (let i = 0; i < iconCount; i++) {
            const img = document.createElement('img');
            const randomIconFile = windowsIcons[getRandom(0, windowsIcons.length - 1)];

            img.src = `${localBase}${randomIconFile}`;
            img.classList.add('retro-icon');
            img.alt = 'Windows 95 Icon';

            img.style.position = 'absolute';
            img.style.pointerEvents = 'auto';
            img.style.cursor = 'move';
            img.style.userSelect = 'none';
            img.style.webkitUserSelect = 'none';

            img.style.zIndex = '1';

            let posX, posY;
            let attempts = 0;
            let tooClose = false;

            do {
                tooClose = false;
                posX = getRandom(30, screenWidth - 80);
                posY = getRandom(30, screenHeight - 80);
                attempts++;

                for (let icon of spawnedIcons) {
                    const dist = Math.hypot(posX - icon.x, posY - icon.y);
                    if (dist < minDistance) {
                        tooClose = true;
                        break;
                    }
                }
            } while (tooClose && attempts < 60);

            spawnedIcons.push({ x: posX, y: posY });

            const randomAngle = getRandom(-45, 45);
            img.dataset.angle = randomAngle;

            img.style.left = `${posX}px`;
            img.style.top = `${posY}px`;
            img.style.transform = `rotate(${randomAngle}deg)`;

            document.body.appendChild(img);

            makeIconDraggable(img);
        }

        const allDivs = document.querySelectorAll('div');
        allDivs.forEach(div => {
            const currentPosition = window.getComputedStyle(div).position;
            if (currentPosition === 'static') {
                div.style.position = 'relative';
            }
            div.style.zIndex = '10';
        });
    };

    window.addEventListener('DOMContentLoaded', generateRetroIcons);
</script>


</body>
